<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Navaritha — Agriculture equipment rental marketplace. Browse, filter, and rent farming equipment easily.">
    <title>Navaritha — Farm Equipment Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/listings.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" id="main-navbar">
        <div class="nav-container">
            <a href="listings.html" class="nav-brand">
                <span class="brand-icon">🌿</span>
                <span class="brand-name">Navaritha</span>
            </a>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li class="lang-switcher">
                    <button class="lang-switcher-btn" id="langSwitcherBtn" aria-label="Select Language">
                        🌐
                    </button>
                    <div class="lang-switcher-menu" id="langSwitcherMenu">
                        <a href="#" class="lang-option active" data-lang="en">English</a>
                        <a href="#" class="lang-option" data-lang="kn">Kannada</a>
                    </div>
                </li>
                <li><a href="listings.html" class="active" data-i18n>Listing</a></li>
                <li><a href="upload.html" data-i18n>Create Listing</a></li>
                <li><a href="my-bookings.html" data-i18n>My Bookings</a></li>
                <li><a href="#" onclick="logout()" data-i18n>Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title" data-i18n>Find the Right Farm Equipment</h1>
            <p class="hero-subtitle" data-i18n>Browse hundreds of agricultural listings. Filter, compare, and rent with ease.</p>
            <div class="hero-search">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="search-input" data-i18n-placeholder placeholder="Search equipment by name..." autocomplete="off">
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="dashboard-container">
        <!-- Sidebar Overlay (mobile) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 data-i18n>Filters</h3>
                <button class="sidebar-close-btn" id="sidebar-close-btn" aria-label="Close filters">✕</button>
            </div>
            <div id="filter-container">
                <!-- Filters populated by JS -->
            </div>

            <div class="price-filter">
                <h4 data-i18n>Price Range</h4>
                <div class="price-values">
                    <span id="min-price-label">₹0</span>
                    <span id="max-price-label">₹0</span>
                </div>
                <div class="slider-container">
                    <div class="slider-track"></div>
                    <input type="range" min="0" max="100" value="0" class="range-input" id="min-slider">
                    <input type="range" min="0" max="100" value="100" class="range-input" id="max-slider">
                </div>
            </div>
        </aside>

        <section class="content-area">
            <!-- Mobile Filter Toggle -->
            <button class="filter-toggle-btn" id="filter-toggle-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M4 6h16M6 12h12M8 18h8"/></svg>
                Filters
            </button>

            <div class="listing-grid" id="listing-grid">
                <!-- Skeleton loaders -->
                <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div></div></div>
                <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line w40"></div><div class="skeleton-line w80"></div><div class="skeleton-line w50"></div></div></div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Navaritha. All rights reserved.</p>
    </footer>

    <script src="js/translator.js"></script>
    <script src="js/auth-guard.js?v=1.0.1"></script>
    <script src="js/listings.js"></script>
</body>
</html>
