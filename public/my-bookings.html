<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Navaritha — View your booked farming equipment.">
    <title>My Bookings — Navaritha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/listings.css">
    <script src="js/auth-guard.js"></script>
    <style>
        .bookings-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .booking-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .booking-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            gap: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.5s ease backwards;
        }
        .booking-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .booking-img {
            width: 200px;
            height: 140px;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .booking-details {
            flex-grow: 1;
        }
        .booking-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .booking-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .booking-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #e0f2fe;
            color: #0369a1;
        }
        .booking-status.confirmed {
            background: #dcfce7;
            color: #15803d;
        }
        .booking-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .booking-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-view {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--primary);
            color: white;
            border: none;
        }
        .btn-view:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 768px) {
            .booking-card { flex-direction: column; padding: 16px; }
            .booking-img { width: 100%; height: 180px; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar" id="main-navbar">
        <div class="nav-container">
            <a href="listings.html" class="nav-brand">
                <span class="brand-icon">🌿</span>
                <span class="brand-name">Navaritha</span>
            </a>
            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="nav-links">
                <li class="lang-switcher">
                    <button class="lang-switcher-btn" id="langSwitcherBtn" aria-label="Select Language">
                        🌐
                    </button>
                    <div class="lang-switcher-menu" id="langSwitcherMenu">
                        <a href="#" class="lang-option active" data-lang="en">English</a>
                        <a href="#" class="lang-option" data-lang="kn">Kannada</a>
                    </div>
                </li>
                <li><a href="listings.html" data-i18n>Listing</a></li>
                <li><a href="upload.html" data-i18n>Create Listing</a></li>
                <li><a href="my-bookings.html" class="active" data-i18n>My Bookings</a></li>
                <li><a href="#" onclick="logout()" data-i18n>Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="bookings-container">
        <h1 class="page-title">
            <span class="icon">📅</span>
            <span data-i18n>My Bookings</span>
        </h1>

        <div id="loadingState" class="state-container">
            <div class="spinner"></div>
            <p data-i18n>Fetching your bookings...</p>
        </div>

        <div id="errorState" class="state-container" style="display: none;">
            <p class="error-msg" id="errorMsg" data-i18n>No bookings found.</p>
            <a href="listings.html" class="btn-primary" data-i18n style="margin-top: 15px; display: inline-block;">Browse Equipment</a>
        </div>

        <div id="bookingList" class="booking-list">
            <!-- Populated by JS -->
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Navaritha. All rights reserved.</p>
    </footer>

    <script src="js/translator.js"></script>
    <script src="js/my-bookings.js"></script>
</body>
</html>
